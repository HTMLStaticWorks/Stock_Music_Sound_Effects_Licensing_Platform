<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | AudioSync</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%231a202c' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M9 18V5l12-2v13'/><circle cx='6' cy='18' r='3'/><circle cx='18' cy='16' r='3'/></svg>">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-secondary);
      margin: 0;
      padding: 2rem;
    }
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      
      padding: 3rem;
      width: 100%;
      max-width: 500px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .auth-brand {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.5rem;
      font-weight: 550;
      color: var(--text-primary);
      margin-bottom: 2rem;
    }
    .auth-brand i { color: var(--accent-color); }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-md);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 1rem;
      transition: all var(--transition-fast) ease;
    }
    .social-btn:hover {
      background: var(--bg-secondary);
      border-color: var(--accent-color);
      transform: translateY(-2px);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 1.5rem 0;
      color: var(--text-secondary);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-color);
    }
    .divider:not(:empty)::before { margin-right: .5em; }
    .divider:not(:empty)::after { margin-left: .5em; }
    .form-group {
      text-align: left;
      margin-bottom: 1.5rem;
      position: relative;
    }
    [dir="rtl"] .form-group { text-align: right; }
    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    .form-input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-md);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
    }
    .form-input:focus { border-color: var(--accent-color); }
    .pwd-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
    }
    [dir="rtl"] .pwd-toggle {
      right: auto;
      left: 1rem;
    }
  </style>
</head>
<body>

  <div class="auth-card fade-in">
    <a href="index.html" class="auth-brand" style="text-decoration: none; color: inherit;">
      <i data-lucide="music-4"></i> AudioSync
    </a>
    
    <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Create an Account</h1>
    <p style="color: var(--text-secondary); margin-bottom: 2rem;">Join thousands of creators using premium audio.</p>

    <!-- Email Registration Form -->
    <form action="dashboard.html">
      <div class="form-group">
        <label class="form-label">First Name</label>
        <input type="text" class="form-input" placeholder="John" required>
      </div>
      <div class="form-group">
        <label class="form-label">Last Name</label>
        <input type="text" class="form-input" placeholder="Doe" required>
      </div>
      
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position: relative;">
          <input type="password" class="form-input" id="pwd" placeholder="Create a password" required>
          <button type="button" class="pwd-toggle" id="pwdToggle">
            <i data-lucide="eye"></i>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div style="position: relative;">
          <input type="password" class="form-input" id="confirmPwd" placeholder="Confirm your password" required>
          <button type="button" class="pwd-toggle" id="confirmPwdToggle">
            <i data-lucide="eye"></i>
          </button>
        </div>
      </div>
      
      <div class="form-group" style="margin-bottom: 1.5rem; display: flex; align-items: flex-start; gap: 0.5rem;">
        <input type="checkbox" required style="margin-top: 0.25rem;">
        <label style="font-size: 0.9rem; color: var(--text-secondary);">
          I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
        </label>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
    </form>
    
    <p style="margin-top: 1.5rem; font-size: 0.95rem;">
      Already have an account? <a href="login.html">Log In</a>
    </p>

    <div class="divider">or</div>

    <!-- Social Logins -->
    <button class="social-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 488 512" style="width:20px; height:20px; fill:currentColor;">
        <path d="M488 261.8C488 403.3 391.1 504 248 504 110.8 504 0 393.2 0 256S110.8 8 248 8c66.8 0 123 24.5 166.3 64.9l-67.5 64.9C258.5 52.6 94.3 116.6 94.3 256c0 86.5 69.1 156.6 153.7 156.6 98.2 0 135-70.4 140.8-106.9H248v-85.3h236.1c2.3 12.7 3.9 24.9 3.9 41.4z"/>
      </svg> Sign up with Google
    </button>
    <button class="social-btn" style="margin-bottom: 0;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512" style="width:20px; height:20px; fill:currentColor;">
        <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
      </svg> Sign up with Apple
    </button>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    lucide.createIcons();
    
    // Password Toggle Logic
    function setupPwdToggle(inputId, toggleId) {
      const input = document.getElementById(inputId);
      const toggle = document.getElementById(toggleId);
      if (!input || !toggle) return;
      
      toggle.addEventListener('click', () => {
        if (input.type === 'password') {
          input.type = 'text';
          toggle.innerHTML = '<i data-lucide="eye-off"></i>';
        } else {
          input.type = 'password';
          toggle.innerHTML = '<i data-lucide="eye"></i>';
        }
        lucide.createIcons();
      });
    }

    setupPwdToggle('pwd', 'pwdToggle');
    setupPwdToggle('confirmPwd', 'confirmPwdToggle');
  </script>
<script src="assets/js/button-functionality.js"></script>
</body>
</html>
