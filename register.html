<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | AudioSync</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-secondary);
      margin: 0;
      padding: 2rem;
    }
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-lg);
      padding: 3rem;
      width: 100%;
      max-width: 500px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .auth-brand {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2rem;
    }
    .auth-brand i { color: var(--accent-color); }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-md);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 1rem;
      transition: background var(--transition-fast);
    }
    .social-btn:hover { background: var(--bg-secondary); }
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 1.5rem 0;
      color: var(--text-secondary);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-color);
    }
    .divider:not(:empty)::before { margin-right: .5em; }
    .divider:not(:empty)::after { margin-left: .5em; }
    .form-group {
      text-align: left;
      margin-bottom: 1.5rem;
      position: relative;
    }
    [dir="rtl"] .form-group { text-align: right; }
    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    .form-input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-md);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
    }
    .form-input:focus { border-color: var(--accent-color); }
    .pwd-toggle {
      position: absolute;
      right: 1rem;
      top: 2.25rem;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
    }
    [dir="rtl"] .pwd-toggle {
      right: auto;
      left: 1rem;
    }
    .auth-actions {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
    }
    [dir="rtl"] .auth-actions {
      right: auto;
      left: 1rem;
    }
  </style>
</head>
<body>

  <!-- Top Actions -->
  <div class="auth-actions">
    <button class="icon-btn theme-toggle" title="Toggle Dark Mode">
      <i data-lucide="moon"></i>
    </button>
    <button class="icon-btn rtl-toggle" title="Toggle RTL">
      <i data-lucide="arrow-left-right"></i>
    </button>
  </div>

  <div class="auth-card fade-in">
    <div class="auth-brand">
      <i data-lucide="music-4"></i> AudioSync
    </div>
    
    <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Create an Account</h1>
    <p style="color: var(--text-secondary); margin-bottom: 2rem;">Join thousands of creators using premium audio.</p>

    <!-- Social Logins -->
    <button class="social-btn">
      <i data-lucide="chrome" style="width:20px; height:20px;"></i> Sign up with Google
    </button>
    <button class="social-btn">
      <i data-lucide="apple" style="width:20px; height:20px;"></i> Sign up with Apple
    </button>

    <div class="divider">or</div>

    <!-- Email Registration Form -->
    <form action="dashboard.html">
      <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
        <div class="form-group" style="flex: 1; min-width: 150px;">
          <label class="form-label">First Name</label>
          <input type="text" class="form-input" placeholder="John" required>
        </div>
        <div class="form-group" style="flex: 1; min-width: 150px;">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-input" placeholder="Doe" required>
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="pwd" placeholder="Create a password" required>
        <button type="button" class="pwd-toggle" id="pwdToggle">
          <i data-lucide="eye"></i>
        </button>
      </div>
      
      <div class="form-group" style="margin-bottom: 1.5rem; display: flex; align-items: flex-start; gap: 0.5rem;">
        <input type="checkbox" required style="margin-top: 0.25rem;">
        <label style="font-size: 0.9rem; color: var(--text-secondary);">
          I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
        </label>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
    </form>
    
    <p style="margin-top: 1.5rem; font-size: 0.95rem;">
      Already have an account? <a href="login.html">Log In</a>
    </p>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    lucide.createIcons();
    
    // Password Toggle Logic
    const pwdInput = document.getElementById('pwd');
    const pwdToggle = document.getElementById('pwdToggle');
    
    pwdToggle.addEventListener('click', () => {
      if (pwdInput.type === 'password') {
        pwdInput.type = 'text';
        pwdToggle.innerHTML = '<i data-lucide="eye-off"></i>';
      } else {
        pwdInput.type = 'password';
        pwdToggle.innerHTML = '<i data-lucide="eye"></i>';
      }
      lucide.createIcons();
    });
  </script>
</body>
</html>
