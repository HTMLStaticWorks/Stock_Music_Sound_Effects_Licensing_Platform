<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | AudioSync</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--bg-secondary);
    }
    .coming-soon-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
      background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=1920&q=80');
      background-size: cover;
      background-position: center;
      color: white;
    }
    .cs-title {
      font-size: 4rem;
      margin-bottom: 1rem;
      color: white;
    }
    .cs-desc {
      color: rgba(255,255,255,0.8);
      max-width: 600px;
      margin-bottom: 3rem;
      font-size: 1.2rem;
    }
    .notify-form {
      display: flex;
      gap: 1rem;
      max-width: 500px;
      width: 100%;
    }
    .notify-input {
      flex: 1;
      padding: 1rem 1.5rem;
      border-radius: 50px;
      border: none;
      outline: none;
      font-size: 1rem;
    }
    .notify-btn {
      border-radius: 50px;
      padding: 1rem 2rem;
      white-space: nowrap;
    }
    @media (max-width: 576px) {
      .notify-form { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="coming-soon-container fade-in">
    <div style="margin-bottom: 2rem;">
      <i data-lucide="music-4" style="width: 64px; height: 64px; color: var(--accent-color);"></i>
    </div>
    <h1 class="cs-title">Something Awesome Is Coming</h1>
    <p class="cs-desc">We are working hard on an entirely new audio licensing experience. Be the first to know when we launch.</p>
    
    <form class="notify-form">
      <input type="email" class="notify-input" placeholder="Enter your email address" required>
      <button type="submit" class="btn btn-primary notify-btn">Notify Me</button>
    </form>
    
    <div style="margin-top: 4rem; display: flex; gap: 1.5rem;">
      <a href="#" style="color: white;"><i data-lucide="twitter"></i></a>
      <a href="#" style="color: white;"><i data-lucide="instagram"></i></a>
      <a href="#" style="color: white;"><i data-lucide="youtube"></i></a>
    </div>
    
    <a href="index.html" style="margin-top: 3rem; color: rgba(255,255,255,0.6); text-decoration: underline;">Back to Home</a>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
