<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | AudioSync</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%231a202c' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M9 18V5l12-2v13'/><circle cx='6' cy='18' r='3'/><circle cx='18' cy='16' r='3'/></svg>">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--bg-secondary);
    }
    .coming-soon-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
      background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=1920&q=80');
      background-size: cover;
      background-position: center;
      color: white;
    }
    .cs-title {
      font-size: 4rem;
      margin-bottom: 1rem;
      color: white;
    }
    .cs-desc {
      color: rgba(255,255,255,0.8);
      max-width: 600px;
      margin-bottom: 3rem;
      font-size: 1.2rem;
    }
    .notify-form {
      display: flex;
      gap: 1rem;
      max-width: 500px;
      width: 100%;
    }
    .notify-input {
      flex: 1;
      padding: 1rem 1.5rem;
      border-radius: 50px;
      border: none;
      outline: none;
      font-size: 1rem;
    }
    .notify-btn {
      border-radius: 50px;
      padding: 1rem 2rem;
      white-space: nowrap;
    }
    @media (max-width: 576px) {
      .notify-form { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="coming-soon-container fade-in">
    <div style="margin-bottom: 2rem;">
      <i data-lucide="music-4" style="width: 64px; height: 64px; color: var(--accent-color);"></i>
    </div>
    <h1 class="cs-title">Something Awesome Is Coming</h1>
    <p class="cs-desc">We are working hard on an entirely new audio licensing experience. Be the first to know when we launch.</p>
    
    <form class="notify-form">
      <input type="email" class="notify-input" placeholder="Enter your email address" required>
      <button type="submit" class="btn btn-primary notify-btn">Notify Me</button>
    </form>
    
    <div style="margin-top: 4rem; display: flex; gap: 1.5rem;">
      <a href="#" style="color: white;"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l11.733 16h4.267l-11.733 -16z"/><path d="M4 20l6.768 -6.768m2.46 -2.46l6.772 -6.772"/></svg></a>
      <a href="#" style="color: white;"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg></a>
      <a href="#" style="color: white;"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33 2.78 2.78 0 0 0 1.94 2c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.33 29 29 0 0 0-.46-5.33z"/><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"/></svg></a>
    </div>
    
    <a href="index.html" style="margin-top: 3rem; color: rgba(255,255,255,0.6); text-decoration: underline;">Back to Home</a>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    lucide.createIcons();
  </script>
<script src="assets/js/button-functionality.js"></script>
</body>
</html>
